<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поздравление</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    text-align:center;

    background-image:url("https://images.unsplash.com/photo-1593341646782-e0b495cff86d");
    background-size:cover;
    background-position:center;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.message{
    position:relative;
    background:white;
    padding:50px 70px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    font-size:40px;
    color:#e63946;
    margin-bottom:20px;
}

p{
    font-size:28px;
    color:#333;
    margin:10px 0;
}

.signature{
    font-size:22px;
    margin-top:20px;
    color:#555;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="message">
<h1>С 8 МАРТА 🌷</h1>
<p>Люблю вас, моя команда! 🤗</p>
<p class="signature">Е.В.</p>
</div>

</body>
</html>
